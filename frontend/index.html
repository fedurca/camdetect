<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>camdetect - multikamerova 3D detekce</title>
  <link rel="stylesheet" href="/style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body class="cameras-hidden">
  <header id="topbar">
    <span class="title">camdetect</span>
    <span id="mode" class="badge">--</span>
    <span id="conn" class="badge badge-off">pripojuji…</span>
    <span id="objcount" class="badge">0 objektu</span>
    <button id="btn-cameras" class="toolbtn">Nahledy kamer</button>
    <button id="btn-settings" class="toolbtn">Nastaveni</button>
    <span class="spacer"></span>
    <span id="legend" class="legend"></span>
  </header>

  <!-- Settings drawer -->
  <section id="drawer" class="hidden">
    <div class="ctl-group">
      <h3>Video detekce</h3>
      <label class="row"><input type="checkbox" id="set-video-enabled" /> Zapnuto</label>
      <label class="row">FPS <input type="range" id="set-video-fps" min="0.5" max="15" step="0.5" /><span id="val-video-fps" class="val"></span></label>
      <label class="row">Rozliseni
        <select id="set-video-imgsz">
          <option value="640">640 (lehke)</option>
          <option value="960">960</option>
          <option value="1280">1280 (narocne)</option>
        </select>
      </label>
      <label class="row">Prah <input type="range" id="set-video-conf" min="0.1" max="0.9" step="0.05" /><span id="val-video-conf" class="val"></span></label>
      <label class="row"><input type="checkbox" id="set-ov-enabled" /> Open-vocabulary (nezname objekty)</label>
      <label class="col">Prompty (carkou):
        <textarea id="set-ov-prompts" rows="2"></textarea>
      </label>
    </div>

    <div class="ctl-group">
      <h3>Atributy osob</h3>
      <label class="row"><input type="checkbox" id="set-attr-behavior" /> Chovani (pohyb)</label>
      <label class="row"><input type="checkbox" id="set-attr-age" /> Odhad veku (experimentalni)</label>
    </div>

    <div class="ctl-group">
      <h3>Zvukova detekce</h3>
      <label class="row"><input type="checkbox" id="set-audio-enabled" /> Zapnuto</label>
      <label class="row"><input type="checkbox" id="set-audio-events" /> Klasifikace udalosti (narocne)</label>
      <label class="row"><input type="checkbox" id="set-audio-engine" /> Rozliseni 2T/4T (exp.)</label>
      <label class="row">Okno (s) <input type="range" id="set-audio-window" min="0.5" max="4" step="0.5" /><span id="val-audio-window" class="val"></span></label>
      <label class="row">Hop (s) <input type="range" id="set-audio-hop" min="0.2" max="2" step="0.1" /><span id="val-audio-hop" class="val"></span></label>
    </div>
    <div class="ctl-note">Narocne modely (open-vocab, audio udalosti, vek) doporuceno na GPU.</div>
  </section>

  <main id="grid">
    <section class="camera-row" id="cameras">
      <section class="panel">
        <div class="panel-head"><span class="dot" data-cam="cam2"></span> cam2</div>
        <img class="stream" data-cam="cam2" alt="cam2" />
      </section>
      <section class="panel">
        <div class="panel-head"><span class="dot" data-cam="cam3"></span> cam3</div>
        <img class="stream" data-cam="cam3" alt="cam3" />
      </section>
      <section class="panel">
        <div class="panel-head"><span class="dot" data-cam="cam4"></span> cam4</div>
        <img class="stream" data-cam="cam4" alt="cam4" />
      </section>
    </section>

    <section class="panel" id="panel-3d">
      <div class="panel-head">3D detekovane objekty
        <span class="hint">tahni = orbit · kolecko = zoom</span>
      </div>
      <div id="scene"></div>
    </section>

    <section class="panel" id="panel-topdown">
      <div class="panel-head">Pohled zeshora</div>
      <canvas id="topdown"></canvas>
    </section>

    <section class="panel" id="panel-audio">
      <div class="panel-head">Zvuk
        <span id="audio-cams" class="tabs"></span>
      </div>
      <div id="audio-body">
        <img id="spectrogram" alt="spektrogram" />
        <canvas id="freq" width="320" height="120"></canvas>
        <ul id="audio-events"></ul>
      </div>
    </section>
  </main>

  <script type="module" src="/main.js"></script>
</body>
</html>
